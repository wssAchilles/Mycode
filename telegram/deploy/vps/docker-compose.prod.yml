services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}:${RELEASE_TAG:?RELEASE_TAG is required}
    restart: unless-stopped
    env_file:
      - ./backend.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    image: ${GATEWAY_IMAGE:?GATEWAY_IMAGE is required}:${RELEASE_TAG:?RELEASE_TAG is required}
    restart: unless-stopped
    env_file:
      - ./backend.env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  delivery_consumer:
    image: ${DELIVERY_CONSUMER_IMAGE:?DELIVERY_CONSUMER_IMAGE is required}:${RELEASE_TAG:?RELEASE_TAG is required}
    restart: unless-stopped
    env_file:
      - ./backend.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4100/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
  backend_uploads:
