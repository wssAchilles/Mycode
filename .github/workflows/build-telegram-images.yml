name: Build Telegram Images to GHCR

on:
  push:
    branches:
      - master
    paths:
      - 'telegram/deploy/vps/**'
      - 'telegram/telegram-clone-backend/**'
      - 'telegram/telegram-rust-gateway/**'
      - 'telegram/telegram-go-delivery-consumer/**'
      - 'telegram/telegram-rust-recommendation/**'
      - '.github/workflows/build-telegram-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: mycode-telegram-backend
            context: ./telegram/telegram-clone-backend
            file: ./telegram/telegram-clone-backend/Dockerfile
          - name: gateway
            image: mycode-telegram-rust-gateway
            context: ./telegram/telegram-rust-gateway
            file: ./telegram/telegram-rust-gateway/Dockerfile
          - name: delivery-consumer
            image: mycode-telegram-go-delivery-consumer
            context: ./telegram/telegram-go-delivery-consumer
            file: ./telegram/telegram-go-delivery-consumer/Dockerfile
          - name: recommendation
            image: mycode-telegram-rust-recommendation
            context: ./telegram/telegram-rust-recommendation
            file: ./telegram/telegram-rust-recommendation/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image vars
        id: vars
        shell: bash
        run: |
          echo "owner_lower=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/${{ matrix.image }}:latest
