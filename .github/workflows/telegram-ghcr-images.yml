name: Build Telegram Images to GHCR

on:
  push:
    branches:
      - master
    paths:
      - "telegram/telegram-clone-backend/**"
      - "telegram/telegram-rust-gateway/**"
      - "telegram/deploy/vps/**"
      - ".github/workflows/telegram-ghcr-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: telegram-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: backend
            context: ./telegram/telegram-clone-backend
            dockerfile: ./telegram/telegram-clone-backend/Dockerfile
            image_name: mycode-telegram-backend
          - service_name: gateway
            context: ./telegram/telegram-rust-gateway
            dockerfile: ./telegram/telegram-rust-gateway/Dockerfile
            image_name: mycode-telegram-rust-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: vars
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/${owner_lc}/${{ matrix.image_name }}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.service_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image }}:master-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image_name }}
          cache-from: type=gha,scope=${{ matrix.service_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_name }}
