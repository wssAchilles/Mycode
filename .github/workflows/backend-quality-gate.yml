name: Backend Quality Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'telegram/telegram-go-delivery-consumer/**'
      - 'telegram/telegram-cpp-graph-service/**'
      - '.github/workflows/backend-quality-gate.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'telegram/telegram-go-delivery-consumer/**'
      - 'telegram/telegram-cpp-graph-service/**'
      - '.github/workflows/backend-quality-gate.yml'

permissions:
  contents: read

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go_unit_tests:
    name: "L1: Go Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: telegram/telegram-go-delivery-consumer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: telegram/telegram-go-delivery-consumer/go.sum

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test -count=1 ./...

  cpp_build_and_tests:
    name: "L1: C++ Build & Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev nlohmann-json3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
        working-directory: telegram/telegram-cpp-graph-service

      - name: Build
        run: cmake --build build -j$(nproc)
        working-directory: telegram/telegram-cpp-graph-service

      - name: Tests
        run: ctest --test-dir build --output-on-failure
        working-directory: telegram/telegram-cpp-graph-service

  go_race_detector:
    name: "L2: Go Race Detector"
    runs-on: ubuntu-latest
    needs: go_unit_tests
    timeout-minutes: 15
    defaults:
      run:
        working-directory: telegram/telegram-go-delivery-consumer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: telegram/telegram-go-delivery-consumer/go.sum

      - name: Race Detector
        run: go test -race -count=1 ./...

  go_static_analysis:
    name: "L3: Go Static Analysis"
    runs-on: ubuntu-latest
    needs: go_unit_tests
    timeout-minutes: 10
    defaults:
      run:
        working-directory: telegram/telegram-go-delivery-consumer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: telegram/telegram-go-delivery-consumer/go.sum

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  cpp_static_analysis:
    name: "L3: C++ Static Analysis"
    runs-on: ubuntu-latest
    needs: cpp_build_and_tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev nlohmann-json3-dev clang-tidy cppcheck

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        working-directory: telegram/telegram-cpp-graph-service

      - name: cppcheck
        run: cppcheck --enable=warning,style --suppress=missingIncludeSystem --error-exitcode=1 src/
        working-directory: telegram/telegram-cpp-graph-service

  cpp_benchmark:
    name: "L4: C++ Benchmark (no regression)"
    runs-on: ubuntu-latest
    needs: [cpp_build_and_tests, cpp_static_analysis]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev nlohmann-json3-dev

      - name: Configure Release
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        working-directory: telegram/telegram-cpp-graph-service

      - name: Build Benchmark
        run: cmake --build build --target graph-store-bench -j$(nproc)
        working-directory: telegram/telegram-cpp-graph-service

      - name: Run Benchmark
        run: ./build/graph-store-bench
        working-directory: telegram/telegram-cpp-graph-service
