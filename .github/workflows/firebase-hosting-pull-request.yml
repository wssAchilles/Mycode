name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    paths:
      - "telegram/**"
      - ".github/workflows/firebase-hosting-pull-request.yml"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: telegram/telegram-clone-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix telegram/telegram-clone-frontend

      - name: Deploy to Firebase Hosting Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TELEGRAM_467705 }}
          projectId: telegram-467705
          entryPoint: telegram
